<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0077DD"/>
      <stop offset="100%" stop-color="#0052A3"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="1" y="1" width="30" height="30" rx="6" ry="6" fill="url(#bg)"/>
  <!-- ✦ four-pointed star — crisp diamond arms -->
  <!-- Vertical arm -->
  <polygon points="16,4.5 17.5,14.5 16,16 14.5,14.5" fill="white"/>
  <polygon points="16,27.5 17.5,17.5 16,16 14.5,17.5" fill="white"/>
  <!-- Horizontal arm -->
  <polygon points="4.5,16 14.5,14.5 16,16 14.5,17.5" fill="white"/>
  <polygon points="27.5,16 17.5,14.5 16,16 17.5,17.5" fill="white"/>
  <!-- Centre fill -->
  <circle cx="16" cy="16" r="1.8" fill="white"/>
</svg>
